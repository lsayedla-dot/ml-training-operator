name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Format check
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e ".[dev,worker]" \
            --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
        env:
          SYNTHETIC: "true"

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f docker/api.Dockerfile -t ml-training-api:ci .
      - name: Build Worker image
        run: docker build -f docker/worker.Dockerfile -t ml-training-worker:ci .
