apiVersion: batch/v1
kind: Job
metadata:
  name: train-JOBNAME-ID
  labels:
    app: ml-training-worker
    job-id: JOB_ID
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: ml-training-worker
        job-id: JOB_ID
    spec:
      serviceAccountName: ml-training-operator
      restartPolicy: Never
      containers:
        - name: training-worker
          image: ml-training-worker:latest
          command: ["python", "-m", "src.worker.train"]
          env:
            - name: MODEL_TYPE
              value: "resnet18"
            - name: EPOCHS
              value: "10"
            - name: BATCH_SIZE
              value: "32"
            - name: LEARNING_RATE
              value: "0.001"
            - name: CHECKPOINT_DIR
              value: "/checkpoints"
            - name: DATA_DIR
              value: "/data"
            - name: WORLD_SIZE
              value: "1"
            - name: RANK
              value: "0"
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: checkpoints
              mountPath: /checkpoints
            - name: data
              mountPath: /data
      volumes:
        - name: checkpoints
          persistentVolumeClaim:
            claimName: ml-training-checkpoints
        - name: data
          persistentVolumeClaim:
            claimName: ml-training-data
