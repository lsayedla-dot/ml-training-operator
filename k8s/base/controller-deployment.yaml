apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-training-controller
  namespace: ml-training
  labels:
    app: ml-training-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-training-controller
  template:
    metadata:
      labels:
        app: ml-training-controller
    spec:
      serviceAccountName: ml-training-operator
      containers:
        - name: controller
          image: ml-training-api:latest
          command: ["python", "-m", "src.controller.manager"]
          envFrom:
            - configMapRef:
                name: ml-training-config
          env:
            - name: DATABASE_PATH
              value: /data/db/jobs.db
          volumeMounts:
            - name: db-storage
              mountPath: /data/db
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: ml-training-db
