apiVersion: v1
kind: ServiceAccount
metadata:
  name: ml-training-operator
  namespace: ml-training
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ml-training-operator
  namespace: ml-training
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ml-training-operator
  namespace: ml-training
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ml-training-operator
subjects:
  - kind: ServiceAccount
    name: ml-training-operator
    namespace: ml-training
