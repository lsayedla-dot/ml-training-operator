apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ml-training

resources:
  - ../../base

patches:
  - path: patches/resource-limits.yaml
    target:
      kind: Deployment
      name: ml-training-api

configMapGenerator:
  - name: ml-training-config
    behavior: merge
    literals:
      - LOG_LEVEL=INFO
